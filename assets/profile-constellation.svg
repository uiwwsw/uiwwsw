    <text x="876" y="108" fill="#F7FAFE" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="17" font-weight="700">product-minded frontend</text>
    <text x="876" y="128" fill="#91ABCC" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="13">from interface to implementation</text>
