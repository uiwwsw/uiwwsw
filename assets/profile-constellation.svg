    <circle cx="1088" cy="296" r="22" fill="#96C0FF" fill-opacity="0.12"/>

    <circle cx="1010" cy="448" r="9" fill="#D4B2FF"/>
    <circle cx="1010" cy="448" r="24" fill="#D4B2FF" fill-opacity="0.12"/>

    <circle cx="842" cy="498" r="8" fill="#FFCB78"/>
    <circle cx="842" cy="498" r="22" fill="#FFCB78" fill-opacity="0.12"/>

    <circle cx="772" cy="380" r="8" fill="#9BD3FF"/>
