    <ellipse cx="934" cy="324" rx="132" ry="116" stroke="#19304A" stroke-width="1.2"/>
  </g>

  <g transform="translate(88 96)">
    <text x="0" y="0" fill="#8FA9CA" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="18" letter-spacing="0.28em">FRONTEND ENGINEER</text>
    <text x="0" y="112" fill="#FAFCFF" font-family="Georgia, Times New Roman, serif" font-size="96" font-weight="700" letter-spacing="-0.05em">uiwwsw</text>
    <text x="0" y="192" fill="#F2F6FD" font-family="Georgia, Times New Roman, serif" font-size="54" letter-spacing="-0.04em">
      <tspan x="0" dy="0">Ideas into products.</tspan>
      <tspan x="0" dy="64">Repetition into tools.</tspan>
    </text>
    <text x="0" y="334" fill="#C4D2E6" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="24" letter-spacing="-0.02em">
      <tspan x="0" dy="0">Build from the interface outward, and go end-to-end</tspan>
      <tspan x="0" dy="36">when the product needs more than the screen.</tspan>
    </text>

    <g transform="translate(0 394)">
      <rect x="0" y="0" width="106" height="40" rx="20" fill="#0E1824" stroke="#283E5C"/>
      <text x="20" y="25" fill="#DBE7F7" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="16">ideas</text>
      <rect x="118" y="0" width="128" height="40" rx="20" fill="#0E1824" stroke="#283E5C"/>
      <text x="138" y="25" fill="#DBE7F7" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="16">products</text>
      <rect x="258" y="0" width="134" height="40" rx="20" fill="#0E1824" stroke="#283E5C"/>
      <text x="278" y="25" fill="#DBE7F7" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="16">tooling</text>
      <rect x="404" y="0" width="152" height="40" rx="20" fill="#0E1824" stroke="#283E5C"/>
      <text x="424" y="25" fill="#DBE7F7" font-family="Segoe UI, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="16">ui systems</text>
    </g>
  </g>

