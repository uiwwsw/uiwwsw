<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">uiwwsw project constellation</title>
  <desc id="desc">A constellation-like visual map connecting uiwwsw with projects including uiwwsw.github.io, GitHubPrint, virtual-keyboard, shadcn2, and YAVN.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="72" x2="1192" y2="568" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131F"/>
      <stop offset="1" stop-color="#04070D"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(886 262) rotate(90) scale(182 240)">
      <stop stop-color="#54B4FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#54B4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(318 496) rotate(90) scale(134 240)">
      <stop stop-color="#FFD37A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFD37A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur24" x="-100" y="-100" width="1480" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#02050B" flood-opacity="0.4"/>
    </filter>
  </defs>

