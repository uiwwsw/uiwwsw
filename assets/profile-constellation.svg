<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">uiwwsw profile banner</title>
  <desc id="desc">A long-lasting cosmic banner for uiwwsw, featuring a minimal constellation and the identity of a frontend engineer who turns ideas into products and repeated work into tools.</desc>
  <defs>
    <linearGradient id="bg" x1="82" y1="72" x2="1186" y2="582" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111C"/>
      <stop offset="0.52" stop-color="#060B14"/>
      <stop offset="1" stop-color="#04070D"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(936 246) rotate(90) scale(220 280)">
      <stop stop-color="#5CAFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#5CAFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(304 504) rotate(90) scale(168 248)">
      <stop stop-color="#FFCB70" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFCB70" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1044 458) rotate(90) scale(132 176)">
      <stop stop-color="#7CE8D7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7CE8D7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur24" x="-100" y="-100" width="1480" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="blur16" x="-100" y="-100" width="1480" height="840" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="softShadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#02050B" flood-opacity="0.42"/>
    </filter>
    <linearGradient id="line" x1="744" y1="126" x2="1126" y2="516" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8DB7FF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#8DE6D7" stop-opacity="0.34"/>
    </linearGradient>
  </defs>

  <g filter="url(#softShadow)">
